<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #1e1f26;
    --cell: #2a2c38;
    --cell-hover: #34364a;
    --line: #44465c;
    --x-color: #6ea8fe;
    --o-color: #ff8fa3;
    --text: #f2f2f5;
    --accent: #7c5cff;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    background: radial-gradient(circle at top, #2c2e3a, var(--bg));
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
  }

  h1 {
    margin: 0;
    font-size: 2rem;
    letter-spacing: 0.05em;
  }

  #status {
    font-size: 1.15rem;
    min-height: 1.6rem;
    font-weight: 600;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
    gap: 8px;
    background: var(--line);
    padding: 8px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  }

  .cell {
    background: var(--cell);
    border: none;
    border-radius: 10px;
    font-size: 3rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
    color: var(--text);
  }

  .cell:hover:not(:disabled) {
    background: var(--cell-hover);
  }

  .cell:disabled {
    cursor: default;
  }

  .cell.x { color: var(--x-color); }
  .cell.o { color: var(--o-color); }

  .cell.win {
    animation: pop 0.35s ease;
    box-shadow: inset 0 0 0 3px var(--accent);
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  #controls {
    display: flex;
    gap: 1rem;
    align-items: center;
  }

  button.action {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: filter 0.15s ease;
  }

  button.action:hover {
    filter: brightness(1.1);
  }

  #scoreboard {
    display: flex;
    gap: 1.5rem;
    font-size: 0.95rem;
    opacity: 0.85;
  }

  #scoreboard span {
    font-weight: 700;
  }

  label {
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
</style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="scoreboard">
    <div>X wins: <span id="scoreX">0</span></div>
    <div>O wins: <span id="scoreO">0</span></div>
    <div>Draws: <span id="scoreDraw">0</span></div>
  </div>

  <div id="status">X's turn</div>

  <div id="board"></div>

  <div id="controls">
    <button class="action" id="resetBtn">Reset Round</button>
    <label>
      <input type="checkbox" id="vsCpu">
      Play vs CPU
    </label>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const resetBtn = document.getElementById('resetBtn');
    const vsCpuCheckbox = document.getElementById('vsCpu');
    const scoreXEl = document.getElementById('scoreX');
    const scoreOEl = document.getElementById('scoreO');
    const scoreDrawEl = document.getElementById('scoreDraw');

    const WIN_LINES = [
      [0,1,2], [3,4,5], [6,7,8],
      [0,3,6], [1,4,7], [2,5,8],
      [0,4,8], [2,4,6],
    ];

    let board = Array(9).fill(null);
    let currentPlayer = 'X';
    let gameOver = false;
    const scores = { X: 0, O: 0, Draw: 0 };

    const cellButtons = [];

    function buildBoard() {
      boardEl.innerHTML = '';
      cellButtons.length = 0;
      for (let i = 0; i < 9; i++) {
        const btn = document.createElement('button');
        btn.className = 'cell';
        btn.dataset.index = i;
        btn.addEventListener('click', () => handleMove(i));
        boardEl.appendChild(btn);
        cellButtons.push(btn);
      }
    }

    function render() {
      board.forEach((val, i) => {
        const btn = cellButtons[i];
        btn.textContent = val || '';
        btn.disabled = !!val || gameOver;
        btn.classList.remove('x', 'o');
        if (val === 'X') btn.classList.add('x');
        if (val === 'O') btn.classList.add('o');
      });
    }

    function checkWinner(b) {
      for (const line of WIN_LINES) {
        const [a, c, d] = line;
        if (b[a] && b[a] === b[c] && b[a] === b[d]) {
          return { winner: b[a], line };
        }
      }
      if (b.every(cell => cell)) return { winner: 'Draw', line: [] };
      return null;
    }

    function handleMove(index) {
      if (gameOver || board[index]) return;
      board[index] = currentPlayer;
      render();

      const result = checkWinner(board);
      if (result) {
        endGame(result);
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      statusEl.textContent = `${currentPlayer}'s turn`;

      if (vsCpuCheckbox.checked && currentPlayer === 'O' && !gameOver) {
        setTimeout(cpuMove, 350);
      }
    }

    function endGame(result) {
      gameOver = true;
      if (result.winner === 'Draw') {
        statusEl.textContent = "It's a draw!";
        scores.Draw++;
        scoreDrawEl.textContent = scores.Draw;
      } else {
        statusEl.textContent = `${result.winner} wins!`;
        scores[result.winner]++;
        (result.winner === 'X' ? scoreXEl : scoreOEl).textContent = scores[result.winner];
        result.line.forEach(i => cellButtons[i].classList.add('win'));
      }
      render();
    }

    function cpuMove() {
      if (gameOver) return;
      const move = findBestMove(board);
      if (move !== -1) handleMove(move);
    }

    // Simple unbeatable-ish CPU: win if possible, block if needed, else pick center/corner/random.
    function findBestMove(b) {
      const empty = () => b.map((v, i) => v ? null : i).filter(v => v !== null);

      for (const i of empty()) {
        const copy = [...b]; copy[i] = 'O';
        if (checkWinner(copy)?.winner === 'O') return i;
      }
      for (const i of empty()) {
        const copy = [...b]; copy[i] = 'X';
        if (checkWinner(copy)?.winner === 'X') return i;
      }
      if (!b[4]) return 4;
      const corners = [0, 2, 6, 8].filter(i => !b[i]);
      if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
      const remaining = empty();
      return remaining.length ? remaining[Math.floor(Math.random() * remaining.length)] : -1;
    }

    function resetRound() {
      board = Array(9).fill(null);
      currentPlayer = 'X';
      gameOver = false;
      statusEl.textContent = "X's turn";
      render();
    }

    resetBtn.addEventListener('click', resetRound);

    buildBoard();
    render();
  </script>
</body>
</html>
